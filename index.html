<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
  <title>Golf Replay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      -webkit-user-select: none; user-select: none;
    }

    /* ── Videos ───────────────────────────────────────────────────────────── */
    video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #preview { z-index: 1; }
    #replay  { z-index: 2; display: none; }

    /* ── HUD overlay ──────────────────────────────────────────────────────── */
    #overlay {
      position: fixed; inset: 0;
      z-index: 10;
      pointer-events: none; /* children opt-in with pointer-events: auto */
    }

    /* Status badge — top left */
    #status-badge {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 16px);
      left: 16px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      color: #fff;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 6px 14px; border-radius: 20px;
    }

    /* Recording indicator — top left, replaces badge while recording */
    #rec-indicator {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 16px);
      left: 16px;
      display: none; align-items: center; gap: 8px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      color: #fff; font-size: 14px; font-weight: 600;
      padding: 6px 14px; border-radius: 20px;
    }
    .rec-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #ff3b30; flex-shrink: 0;
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* Settings button — top right */
    #settings-btn {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 12px);
      right: 16px;
      width: 44px; height: 44px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: none; border-radius: 50%;
      color: #fff; font-size: 20px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
    }

    /* Countdown — centre screen */
    #countdown {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: min(50vw, 220px); font-weight: 800;
      text-shadow: 0 0 80px rgba(0,0,0,0.5);
      line-height: 1; display: none;
      animation: cdPop 0.25s ease-out;
    }
    @keyframes cdPop {
      from { transform: translate(-50%,-50%) scale(1.5); opacity: 0; }
      to   { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
    }

    /* Replay info — top centre */
    #replay-info {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 16px);
      left: 50%; transform: translateX(-50%);
      display: none; flex-direction: column; align-items: center; gap: 6px;
      white-space: nowrap;
    }
    .speed-badge {
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      color: #fff; font-size: 15px; font-weight: 700;
      padding: 8px 18px; border-radius: 20px;
    }
    .cycle-counter {
      background: rgba(0,0,0,0.45);
      color: rgba(255,255,255,0.75);
      font-size: 12px; font-weight: 600;
      padding: 4px 12px; border-radius: 14px;
    }

    /* Instruction hint — bottom centre */
    #instruction {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 36px);
      left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.88);
      font-size: 14px; font-weight: 500;
      padding: 10px 20px; border-radius: 20px;
      white-space: nowrap;
    }

    /* Error banner */
    #error-banner {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      background: rgba(255,59,48,0.92);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      color: #fff; font-size: 15px; font-weight: 600;
      padding: 18px 24px; border-radius: 16px;
      text-align: center; max-width: min(90vw, 340px);
      line-height: 1.5; white-space: pre-line;
      display: none;
    }

    /* ── Settings panel ───────────────────────────────────────────────────── */
    #settings-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 90; display: none;
      pointer-events: auto;
    }
    #settings-panel {
      position: fixed; left: 0; right: 0; bottom: 0;
      background: rgba(22,22,24,0.97);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      color: #fff;
      padding: 12px 24px calc(env(safe-area-inset-bottom, 0px) + 24px);
      border-radius: 24px 24px 0 0;
      z-index: 100;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      pointer-events: auto;
    }
    #settings-panel.open { transform: translateY(0); }
    .drag-handle {
      width: 40px; height: 5px;
      background: rgba(255,255,255,0.25);
      border-radius: 3px; margin: 0 auto 16px;
    }
    .panel-title {
      font-size: 18px; font-weight: 700;
      text-align: center; margin-bottom: 20px;
    }
    .setting-row { margin-bottom: 18px; }
    .setting-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(255,255,255,0.45); margin-bottom: 8px;
    }
    .pill-group { display: flex; gap: 8px; }
    .pill-btn {
      flex: 1; padding: 11px 6px;
      background: rgba(255,255,255,0.08);
      border: 2px solid transparent; border-radius: 12px;
      color: rgba(255,255,255,0.7);
      font-size: 14px; font-weight: 600;
      cursor: pointer; text-align: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .pill-btn.active {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.55);
      color: #fff;
    }
    #done-btn {
      margin-top: 6px; width: 100%; padding: 14px;
      background: rgba(255,255,255,0.1);
      border: none; border-radius: 14px;
      color: #fff; font-size: 16px; font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

<!-- Live camera preview -->
<video id="preview" autoplay muted playsinline></video>

<!-- Replay playback — muted because no audio was recorded -->
<video id="replay" muted playsinline></video>

<!-- HUD -->
<div id="overlay">
  <div id="status-badge">Ready</div>

  <div id="rec-indicator">
    <span class="rec-dot"></span>
    <span id="rec-time">0:00</span>
  </div>

  <div id="countdown"></div>

  <div id="replay-info">
    <div id="speed-badge" class="speed-badge">▶ Normal Speed</div>
    <div id="cycle-counter" class="cycle-counter"></div>
  </div>

  <div id="instruction">Tap anywhere or press button to start</div>
  <div id="error-banner"></div>

  <button id="settings-btn" aria-label="Settings">⚙</button>
</div>

<!-- Settings -->
<div id="settings-backdrop"></div>
<div id="settings-panel" role="dialog" aria-label="Settings">
  <div class="drag-handle"></div>
  <div class="panel-title">Settings</div>

  <div class="setting-row">
    <div class="setting-label">Camera</div>
    <div class="pill-group" id="grp-camera">
      <button class="pill-btn active" data-value="user">Front</button>
      <button class="pill-btn"        data-value="environment">Rear</button>
    </div>
  </div>

  <div class="setting-row">
    <div class="setting-label">Countdown</div>
    <div class="pill-group" id="grp-countdown">
      <button class="pill-btn"        data-value="3">3 s</button>
      <button class="pill-btn active" data-value="5">5 s</button>
      <button class="pill-btn"        data-value="10">10 s</button>
    </div>
  </div>

  <div class="setting-row">
    <div class="setting-label">Replays</div>
    <div class="pill-group" id="grp-replays">
      <button class="pill-btn active" data-value="1">1</button>
      <button class="pill-btn"        data-value="2">2</button>
      <button class="pill-btn"        data-value="3">3</button>
    </div>
  </div>

  <button id="done-btn">Done</button>
</div>

<script>
(function () {
  'use strict';

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const previewVid   = document.getElementById('preview');
  const replayVid    = document.getElementById('replay');
  const statusBadge  = document.getElementById('status-badge');
  const recIndicator = document.getElementById('rec-indicator');
  const recTimeEl    = document.getElementById('rec-time');
  const countdownEl  = document.getElementById('countdown');
  const replayInfo   = document.getElementById('replay-info');
  const speedBadge   = document.getElementById('speed-badge');
  const cycleCounter = document.getElementById('cycle-counter');
  const instruction  = document.getElementById('instruction');
  const errorBanner  = document.getElementById('error-banner');
  const settingsBtn  = document.getElementById('settings-btn');
  const settingsPanel= document.getElementById('settings-panel');
  const backdrop     = document.getElementById('settings-backdrop');
  const doneBtn      = document.getElementById('done-btn');

  // ── Config (mirrors the settings UI defaults) ──────────────────────────────
  const cfg = { camera: 'user', countdown: 5, replays: 1 };

  // ── App state ──────────────────────────────────────────────────────────────
  let appState     = 'idle';   // idle | countdown | recording | replay
  let stream       = null;
  let recorder     = null;
  let chunks       = [];
  let replayUrl    = null;
  let cdTimer      = null;
  let cdValue      = 0;
  let recTimer     = null;
  let recSecs      = 0;
  let replayCycle  = 0;        // 0 = 1×  1 = 0.5×
  let replayIter   = 0;        // how many full (1× + 0.5×) cycles done
  let settingsOpen = false;

  // ── Camera ─────────────────────────────────────────────────────────────────
  async function startCamera() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: cfg.camera },
        audio: false,
      });
      previewVid.srcObject = stream;
      // Mirror front camera so it feels like a natural mirror for positioning
      previewVid.style.transform = cfg.camera === 'user' ? 'scaleX(-1)' : '';
      hideError();
    } catch {
      showError('Camera access denied.\nPlease allow camera access and reload the page.');
    }
  }

  // ── MIME-type detection ────────────────────────────────────────────────────
  function bestMime() {
    const candidates = [
      'video/mp4;codecs=avc1',
      'video/mp4',
      'video/webm;codecs=vp9',
      'video/webm;codecs=vp8',
      'video/webm',
    ];
    return candidates.find(t => {
      try { return MediaRecorder.isTypeSupported(t); } catch { return false; }
    }) ?? '';
  }

  // ── Input handling ─────────────────────────────────────────────────────────
  const TRIGGER_KEYS = new Set([' ', 'Enter', 'ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown']);

  document.addEventListener('keydown', e => {
    if (e.repeat) return;
    if (TRIGGER_KEYS.has(e.key)) { e.preventDefault(); onTrigger(); }
  });

  // Tap anywhere that is NOT a settings element
  document.addEventListener('pointerdown', e => {
    if (e.target.closest('#settings-panel, #settings-btn, #settings-backdrop')) return;
    onTrigger();
  });

  function onTrigger() {
    if (settingsOpen) { closeSettings(); return; }
    if      (appState === 'idle')       startCountdown();
    else if (appState === 'countdown')  cancelCountdown();
    else if (appState === 'recording')  stopRecording();
    else if (appState === 'replay')     endReplay();
  }

  // ── Countdown ──────────────────────────────────────────────────────────────
  function startCountdown() {
    if (!stream) return;
    setState('countdown');
    cdValue = cfg.countdown;
    showCd(cdValue);
    cdTimer = setInterval(() => {
      cdValue--;
      if (cdValue <= 0) {
        clearInterval(cdTimer); cdTimer = null;
        showCd(null);
        startRecording();
      } else {
        showCd(cdValue);
      }
    }, 1000);
  }

  function cancelCountdown() {
    if (cdTimer) { clearInterval(cdTimer); cdTimer = null; }
    showCd(null);
    setState('idle');
  }

  function showCd(n) {
    if (n === null) {
      countdownEl.style.display = 'none';
    } else {
      countdownEl.textContent = n;
      // Restart animation so each number pops in
      countdownEl.style.animation = 'none';
      void countdownEl.offsetWidth;
      countdownEl.style.animation = '';
      countdownEl.style.display = '';
    }
  }

  // ── Recording ──────────────────────────────────────────────────────────────
  function startRecording() {
    if (!window.MediaRecorder) {
      showError('Recording is not supported in this browser.\nPlease use iOS 14.5+ Safari or a modern desktop browser.');
      setState('idle');
      return;
    }
    setState('recording');
    chunks = [];

    const mime = bestMime();
    try {
      recorder = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
    } catch {
      recorder = new MediaRecorder(stream);
    }

    recorder.ondataavailable = e => { if (e.data?.size > 0) chunks.push(e.data); };
    recorder.onerror = () => {
      if (recTimer) { clearInterval(recTimer); recTimer = null; }
      showError('Recording failed. Please try again.');
      setState('idle');
    };
    recorder.onstop = () => {
      const type = recorder.mimeType || 'video/mp4';
      replayUrl = URL.createObjectURL(new Blob(chunks, { type }));
      startReplay();
    };

    recorder.start(100); // collect data in 100 ms chunks for reliability on iOS
    recSecs = 0;
    updateRecTime();
    recTimer = setInterval(() => { recSecs++; updateRecTime(); }, 1000);
  }

  function stopRecording() {
    if (recTimer) { clearInterval(recTimer); recTimer = null; }
    if (recorder?.state !== 'inactive') recorder.stop();
  }

  function updateRecTime() {
    const m = Math.floor(recSecs / 60);
    const s = recSecs % 60;
    recTimeEl.textContent = `${m}:${String(s).padStart(2, '0')}`;
  }

  // ── Replay ─────────────────────────────────────────────────────────────────
  function startReplay() {
    setState('replay');
    replayIter  = 0;
    replayCycle = 0;
    previewVid.style.display = 'none';
    replayVid.style.display  = '';
    replayVid.src = replayUrl;
    playSegment();
  }

  function playSegment() {
    replayVid.currentTime  = 0;
    replayVid.playbackRate = replayCycle === 0 ? 1.0 : 0.5;
    speedBadge.textContent = replayCycle === 0 ? '▶ Normal Speed' : '▶ Slow Motion';

    if (cfg.replays > 1) {
      cycleCounter.textContent = `Replay ${replayIter + 1} of ${cfg.replays}`;
      cycleCounter.style.display = '';
    } else {
      cycleCounter.style.display = 'none';
    }

    replayVid.play().catch(() => {});
  }

  replayVid.addEventListener('ended', () => {
    if (appState !== 'replay') return;
    if (replayCycle === 0) {
      // Just finished normal speed — switch to slow motion
      replayCycle = 1;
      playSegment();
    } else {
      // Finished slow motion — one full cycle done
      replayIter++;
      if (replayIter < cfg.replays) {
        replayCycle = 0;
        playSegment();
      } else {
        endReplay();
      }
    }
  });

  function endReplay() {
    replayVid.pause();
    replayVid.removeAttribute('src');
    replayVid.load(); // reset element state
    if (replayUrl) { URL.revokeObjectURL(replayUrl); replayUrl = null; }
    replayVid.style.display  = 'none';
    previewVid.style.display = '';
    setState('idle');
  }

  // ── UI state ───────────────────────────────────────────────────────────────
  function setState(s) {
    appState = s;

    // Reset all HUD elements to hidden/default
    statusBadge.style.display  = '';
    recIndicator.style.display = 'none';
    countdownEl.style.display  = 'none';
    replayInfo.style.display   = 'none';
    instruction.style.display  = '';
    settingsBtn.style.display  = '';

    switch (s) {
      case 'idle':
        statusBadge.textContent = 'Ready';
        instruction.textContent = 'Tap anywhere or press button to start';
        break;
      case 'countdown':
        statusBadge.textContent = 'Get Ready';
        instruction.textContent = 'Press again to cancel';
        settingsBtn.style.display = 'none';
        break;
      case 'recording':
        statusBadge.style.display  = 'none';
        recIndicator.style.display = 'flex';
        instruction.textContent    = 'Press to stop recording';
        settingsBtn.style.display  = 'none';
        break;
      case 'replay':
        statusBadge.style.display = 'none';
        replayInfo.style.display  = 'flex';
        instruction.style.display = 'none';
        settingsBtn.style.display = 'none';
        break;
    }
  }

  // ── Error ──────────────────────────────────────────────────────────────────
  function showError(msg) {
    errorBanner.textContent  = msg;
    errorBanner.style.display = '';
    instruction.style.display = 'none';
  }
  function hideError() { errorBanner.style.display = 'none'; }

  // ── Settings panel ─────────────────────────────────────────────────────────
  function openSettings() {
    settingsOpen = true;
    settingsPanel.classList.add('open');
    backdrop.style.display = 'block';
  }
  function closeSettings() {
    settingsOpen = false;
    settingsPanel.classList.remove('open');
    backdrop.style.display = 'none';
  }

  settingsBtn.addEventListener('click', e => { e.stopPropagation(); openSettings(); });
  backdrop.addEventListener('click', closeSettings);
  doneBtn.addEventListener('click', closeSettings);

  // Pill button groups — camera / countdown / replays
  ['camera', 'countdown', 'replays'].forEach(key => {
    const grp = document.getElementById(`grp-${key}`);
    grp.addEventListener('click', async e => {
      const btn = e.target.closest('.pill-btn');
      if (!btn) return;
      grp.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const raw = btn.dataset.value;
      cfg[key] = key === 'camera' ? raw : parseInt(raw, 10);
      // Restart camera immediately if the facing mode changed (only safe while idle)
      if (key === 'camera' && appState === 'idle') await startCamera();
    });
  });

  // ── Bootstrap ──────────────────────────────────────────────────────────────
  setState('idle');
  startCamera();
})();
</script>
</body>
</html>
